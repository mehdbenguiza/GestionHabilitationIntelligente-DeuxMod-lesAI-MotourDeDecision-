# ════════════════════════════════════════════════════════════════════════════
#  docker-compose.yml
#  Projet PFE : Gestion Intelligente des Habilitations IT — BIAT 2026
#
#  Usage :
#    Lancer  → docker-compose up --build
#    Arrêter → docker-compose down
#    Logs    → docker-compose logs -f
# ════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ════════════════════════════════════════════════════════════════════════
  #  Backend FastAPI — Port 8000
  # ════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: pfe_backend
    image: pfe-backend:latest
    ports:
      - "8000:8000"

    # Variables d'environnement (surchargent les valeurs par défaut)
    # Les secrets sensibles doivent être dans un fichier .env à la racine
    environment:
      - DATABASE_URL=sqlite:///./data/production.db
      - SECRET_KEY=${SECRET_KEY:-change_moi_avec_une_longue_phrase_secrete_en_prod}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - SMTP_SERVER=${SMTP_SERVER:-smtp.gmail.com}
      - SMTP_PORT=587
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@biat-it.com.tn}
      - ENVIRONMENT=production
      - ITOP_API_URL=${ITOP_API_URL:-}
      - ITOP_USERNAME=${ITOP_USERNAME:-}
      - ITOP_PASSWORD=${ITOP_PASSWORD:-}

    # Volumes persistants : les données survivent aux redémarrages
    volumes:
      - ./Backend/models:/app/models            # Modèles ML (partagés host ↔ conteneur)
      - backend_data:/app/data                  # Base de données SQLite persistante
      - backend_uploads:/app/uploads            # Fichiers uploadés (PDF, images)

    # Vérification de santé du service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    restart: unless-stopped
    networks:
      - pfe_network

  # ════════════════════════════════════════════════════════════════════════
  #  Frontend React + Nginx — Port 80
  # ════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./FrontendPFE
      dockerfile: Dockerfile
    container_name: pfe_frontend
    image: pfe-frontend:latest
    ports:
      - "80:80"

    # Démarre seulement quand le backend est healthy
    depends_on:
      backend:
        condition: service_healthy

    # Vérification de santé
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped
    networks:
      - pfe_network

# ════════════════════════════════════════════════════════════════════════════
#  Volumes nommés (données persistantes)
# ════════════════════════════════════════════════════════════════════════════
volumes:
  backend_data:
    driver: local
  backend_uploads:
    driver: local

# ════════════════════════════════════════════════════════════════════════════
#  Réseau interne (les conteneurs se parlent par nom de service)
# ════════════════════════════════════════════════════════════════════════════
networks:
  pfe_network:
    driver: bridge
