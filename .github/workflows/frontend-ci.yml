# ════════════════════════════════════════════════════════════════════════════
#  frontend-ci.yml — Pipeline CI Frontend
#  Projet PFE : Gestion Intelligente des Habilitations IT — BIAT 2026
#
#  Déclencheur : git push sur main/develop (fichiers FrontendPFE/**)
#
#  Étapes :
#    1. build         → npm ci + vite build (vérifie la compilabilité)
#    2. docker-build  → Construction image multi-stage React + Nginx
# ════════════════════════════════════════════════════════════════════════════

name: 🎨 Frontend CI — Build & Docker

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'FrontendPFE/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'FrontendPFE/**'

# Annule les pipelines en cours si un nouveau push arrive
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  #  JOB 1 : Build — Compilation React/Vite
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build React/Vite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⬢ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FrontendPFE/package-lock.json

      - name: 📦 Installer les dépendances (npm ci — installation stricte)
        working-directory: FrontendPFE
        run: npm ci

      - name: 🏗️ Construire le bundle de production
        working-directory: FrontendPFE
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: 📊 Afficher la taille du bundle
        working-directory: FrontendPFE
        run: |
          echo "## 🎨 Bundle Frontend" >> $GITHUB_STEP_SUMMARY
          echo "### Fichiers générés dans dist/" >> $GITHUB_STEP_SUMMARY
          du -sh dist/
          du -sh dist/* 2>/dev/null | sort -h | tail -20

      - name: 💾 Sauvegarder le bundle compilé
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: FrontendPFE/dist/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  #  JOB 2 : Docker Build — Validation image frontend
  # ══════════════════════════════════════════════════════════════════════════
  docker-build-frontend:
    name: 🐳 Docker Build (Multi-Stage)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐳 Construire l'image Docker frontend (Node → Nginx)
        run: |
          docker build \
            --tag pfe-frontend:${{ github.sha }} \
            --tag pfe-frontend:latest \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VITE_API_URL=http://localhost:8000 \
            ./FrontendPFE

      - name: 🏥 Vérifier que Nginx démarre correctement
        run: |
          docker run -d \
            --name test_frontend \
            -p 8080:80 \
            pfe-frontend:latest

          sleep 5

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend Nginx opérationnel (HTTP $STATUS)"
          else
            echo "❌ Frontend Nginx inaccessible (HTTP $STATUS)"
            docker logs test_frontend
            exit 1
          fi

          docker stop test_frontend
          docker rm test_frontend

      - name: 📋 Afficher les informations de l'image
        run: |
          echo "## 🐳 Image Docker Frontend" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: pfe-frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Base**: nginx:alpine" >> $GITHUB_STEP_SUMMARY
          docker image inspect pfe-frontend:latest \
            --format='- **Taille finale**: {{.Size}} bytes' >> $GITHUB_STEP_SUMMARY
